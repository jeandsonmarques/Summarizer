name: Python CI

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall plugin/Summarizer

      - name: Lint with ruff
        run: python -m ruff check tests plugin/Summarizer/utils/logging_utils.py plugin/Summarizer/utils/security_utils.py plugin/Summarizer/report_view/result_models.py plugin/Summarizer/report_view/charts

      - name: Test with pytest
        run: pytest --cov=Summarizer --cov-report=term-missing --cov-fail-under=0
